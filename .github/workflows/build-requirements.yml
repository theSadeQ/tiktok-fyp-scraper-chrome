name: Build Requirements Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bundle:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Download all packages as Windows wheels (cp39)
        shell: pwsh
        run: |
          mkdir wheels
          pip download -r requirements.txt -d wheels `
            --only-binary=:all: `
            --prefer-binary `
            --platform win_amd64 `
            --python-version 39 `
            --implementation cp `
            --abi cp39

      - name: Verify all wheels are present
        shell: pwsh
        run: |
          Write-Host "Downloaded wheels:"
          Get-ChildItem wheels\ | ForEach-Object { Write-Host $_.Name }

      - name: Install Playwright and download Chromium binary
        shell: pwsh
        run: |
          pip install playwright
          playwright install chromium

      - name: Zip wheels bundle
        shell: pwsh
        run: Compress-Archive -Path wheels -DestinationPath requirements_wheels_windows.zip

      - name: Zip Chromium binary
        shell: pwsh
        run: |
          $chromiumPath = "$env:USERPROFILE\AppData\Local\ms-playwright"
          if (Test-Path $chromiumPath) {
            $dirs = Get-ChildItem -Path $chromiumPath -Directory -Filter "chromium-*"
            if ($dirs.Count -gt 0) {
              Compress-Archive -Path "$chromiumPath\chromium-*" -DestinationPath chromium_bin_windows.zip
              Write-Host "Chromium zipped successfully"
            } else {
              Write-Host "No chromium-* folder found"
              New-Item -ItemType File -Path chromium_bin_windows.zip
            }
          } else {
            Write-Host "ms-playwright path not found"
            New-Item -ItemType File -Path chromium_bin_windows.zip
          }

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Offline Installation Bundle (Windows x64 — Python 3.9)

            | File | Description |
            |------|-------------|
            | `requirements_wheels_windows.zip` | All Python packages as Windows `.whl` files (cp39) |
            | `chromium_bin_windows.zip` | Chromium browser binary for Playwright (Windows) |

            ### Install Instructions
            ```cmd
            :: 1. Extract requirements_wheels_windows.zip -> wheels\ folder

            :: 2. Install packages offline
            pip install --no-index --find-links=wheels -r requirements.txt

            :: 3. Extract chromium_bin_windows.zip to:
            ::    %USERPROFILE%\AppData\Local\ms-playwright\
            ```

            > Requires **Python 3.9** on **Windows x64**
          files: |
            requirements_wheels_windows.zip
            chromium_bin_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

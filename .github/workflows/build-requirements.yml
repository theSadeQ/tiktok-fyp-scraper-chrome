name: Build Requirements Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bundle:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all packages as Windows wheels
        run: |
          mkdir wheels
          pip download -r requirements.txt -d wheels --prefer-binary --platform win_amd64 --python-version 3.11 --only-binary=:all:

      - name: Install Playwright and download Chromium binary
        run: |
          pip install playwright
          playwright install chromium

      - name: Zip wheels bundle
        shell: pwsh
        run: Compress-Archive -Path wheels -DestinationPath requirements_wheels_windows.zip

      - name: Zip Chromium binary
        shell: pwsh
        run: |
          $chromiumPath = "$env:USERPROFILE\AppData\Local\ms-playwright"
          if (Test-Path $chromiumPath) {
            $chromiumDirs = Get-ChildItem -Path $chromiumPath -Directory -Filter "chromium-*"
            if ($chromiumDirs.Count -gt 0) {
              Compress-Archive -Path "$chromiumPath\chromium-*" -DestinationPath chromium_bin_windows.zip
            } else {
              Write-Host "No chromium-* folder found"
              New-Item -ItemType File -Path chromium_bin_windows.zip
            }
          } else {
            Write-Host "ms-playwright path not found"
            New-Item -ItemType File -Path chromium_bin_windows.zip
          }

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Offline Installation Bundle (Windows x64)

            Download the assets below to install on **Windows** without internet access:

            | File | Description |
            |------|-------------|
            | `requirements_wheels_windows.zip` | All Python packages as Windows `.whl` files |
            | `chromium_bin_windows.zip` | Chromium browser binary for Playwright (Windows) |

            ### Install Instructions
            ```cmd
            :: 1. Extract requirements_wheels_windows.zip -> wheels folder

            :: 2. Install packages offline
            pip install --no-index --find-links=wheels -r requirements.txt

            :: 3. Extract chromium_bin_windows.zip to:
            ::    %USERPROFILE%\AppData\Local\ms-playwright\
            ```

            > Requires Python 3.11 on Windows x64
          files: |
            requirements_wheels_windows.zip
            chromium_bin_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

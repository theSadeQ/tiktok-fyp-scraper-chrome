name: Test Media Blocking

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-no-video-download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run media block test
        run: python test_media_blocking.py

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-block-report
          path: media_block_report.json
